<!doctype html>
<html lang="en">
  <!-- -------------------------------------------
       HEAD SECTION
       ------------------------------------------- -->
  <head>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='admin/css/bootstrap/css/bootstrap.css') }}"
    />
    <!-- Style CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='admin/css/login.css') }}"
    />

    <!-- Custom Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Responsiveness -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | {{ title }}</title>
  </head>

  <!-- --------------------------------------------
       BODY SECTION
       ------------------------------------------- -->
  <body>
    <div class="container-fluid min-vh-100 py-4 py-sm-5">
      <div class="row min-vh-100 align-items-center justify-content-center g-0">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4 px-3 px-sm-0">
          <div class="wrapper mx-auto p-4 p-sm-5 rounded-3">
            <div
              class="logo_and_pill d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4 mb-sm-5"
            >
              <img
                src="{{ url_for('static', filename='admin/assets/hidden_gem_logo.svg') }}"
                alt="logo"
                style="width: 120px; height: auto"
              />
              <span class="pill">Admin BackOffice</span>
            </div>

            <!-- Heading -->
            <div class="heading mb-3 mb-sm-4">
              <h2>Welcome Back</h2>
              <p class="subtext">Sign in to manage the Hidden Gems platform.</p>
            </div>

            <!-- login form -->
            <form action="" method="POST">
              <!-- email -->
              <div class="mb-3">
                <label for="Email" class="form-label">Email address</label>
                <input
                  type="email"
                  class="form-control"
                  id="Email"
                  placeholder="john.doe@example.com"
                  aria-describedby="emailHelp"
                />
              </div>

              <!-- password -->
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="••••••••"
                />
              </div>

              <!-- Login Button -->
              <button
                type="submit"
                class="btn btn-primary w-100 create-account"
              >
                Login
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ----------------------------------------------
         JAVASCRIPT SECTIONS
         ------------------------------------------- -->
    <script src="../css/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
